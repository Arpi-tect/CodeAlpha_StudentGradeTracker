<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ApexGrade - Student Analytics & Grade Tracker</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel CDNs -->
    <script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>
    <script>
      Babel.registerPreset("custom-react", {
        presets: [
          [Babel.availablePresets["react"], { runtime: "classic" }]
        ]
      });
    </script>
    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background: radial-gradient(circle at top right, #111827 0%, #030712 100%);
            color: #f3f4f6;
        }
        .glass-panel {
            background: rgba(17, 24, 39, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
        }
        .glow-indigo {
            text-shadow: 0 0 10px rgba(99, 102, 241, 0.5);
        }
    </style>
</head>
<body class="min-h-screen py-10 px-4">
    <div id="root"></div>

    <script type="text/babel" data-presets="custom-react">
        const { useState, useEffect } = React;

        function App() {
            const [students, setStudents] = useState([]);
            const [stats, setStats] = useState({ average: 0, highest: 0, highestName: 'N/A', lowest: 0, lowestName: 'N/A', count: 0 });
            const [name, setName] = useState('');
            const [grade, setGrade] = useState('');
            const [loading, setLoading] = useState(true);

            // Fetch data on load
            useEffect(() => {
                fetchData();
            }, []);

            const fetchData = async () => {
                try {
                    const studentsRes = await fetch('/api/students');
                    const studentsData = await studentsRes.json();
                    setStudents(studentsData);

                    const statsRes = await fetch('/api/students/stats');
                    const statsData = await statsRes.json();
                    setStats(statsData);
                    setLoading(false);
                } catch (err) {
                    console.error("Error loading data:", err);
                    setLoading(false);
                }
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                if (!name.trim() || !grade.trim()) return;

                const numericGrade = parseFloat(grade);
                if (isNaN(numericGrade) || numericGrade < 0 || numericGrade > 100) {
                    alert("Grade must be a number between 0 and 100.");
                    return;
                }

                try {
                    await fetch('/api/students', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ name: name.trim(), grade: numericGrade })
                    });
                    setName('');
                    setGrade('');
                    fetchData();
                } catch (err) {
                    console.error("Error saving student:", err);
                }
            };

            const handleDelete = async (id) => {
                if (!confirm("Are you sure you want to delete this student record?")) return;
                try {
                    await fetch(`/api/students/${id}`, { method: 'DELETE' });
                    fetchData();
                } catch (err) {
                    console.error("Error deleting student:", err);
                }
            };

            if (loading) {
                return (
                    <div className="flex items-center justify-center min-h-screen">
                        <div className="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-indigo-500"></div>
                    </div>
                );
            }

            return (
                <div className="max-w-5xl mx-auto">
                    {/* Header */}
                    <div className="glass-panel rounded-3xl p-8 mb-8 text-center border-t border-indigo-500/20">
                        <h1 className="text-3xl font-extrabold tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 to-purple-400 mb-2">APEXGRADE ANALYTICS</h1>
                        <p className="text-xs font-semibold text-slate-400 uppercase tracking-widest">Enterprise Student Performance Dashboard</p>
                    </div>

                    {/* Stats Dashboard */}
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                        <div className="glass-panel rounded-2xl p-6 flex flex-col items-center justify-center border-l-4 border-indigo-500">
                            <span className="text-xs font-bold uppercase tracking-wider text-slate-400 mb-2">Class Average</span>
                            <span className="text-4xl font-extrabold text-indigo-400 glow-indigo">
                                {stats.average ? stats.average.toFixed(2) : "0.00"}%
                            </span>
                        </div>
                        <div className="glass-panel rounded-2xl p-6 flex flex-col items-center justify-center border-l-4 border-emerald-500">
                            <span className="text-xs font-bold uppercase tracking-wider text-slate-400 mb-2">Highest Score</span>
                            <span className="text-3xl font-extrabold text-emerald-400">
                                {stats.highest ? stats.highest.toFixed(1) : "0.0"}%
                            </span>
                            <span className="text-xs font-semibold text-slate-300 mt-1">({stats.highestName})</span>
                        </div>
                        <div className="glass-panel rounded-2xl p-6 flex flex-col items-center justify-center border-l-4 border-rose-500">
                            <span className="text-xs font-bold uppercase tracking-wider text-slate-400 mb-2">Lowest Score</span>
                            <span className="text-3xl font-extrabold text-rose-400">
                                {stats.lowest ? stats.lowest.toFixed(1) : "0.0"}%
                            </span>
                            <span className="text-xs font-semibold text-slate-300 mt-1">({stats.lowestName})</span>
                        </div>
                    </div>

                    {/* Main Content Layout */}
                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                        {/* Form Panel (1 Col) */}
                        <div className="glass-panel rounded-2xl p-6 h-fit border-t border-slate-800">
                            <h2 className="text-lg font-bold text-indigo-300 mb-6 pb-2 border-b border-slate-800">Add Student Record</h2>
                            <form onSubmit={handleSubmit} className="space-y-4">
                                <div>
                                    <label className="block text-xs font-bold text-slate-300 uppercase mb-2">Student Name</label>
                                    <input 
                                        type="text" 
                                        value={name} 
                                        onChange={(e) => setName(e.target.value)} 
                                        placeholder="e.g. John Doe"
                                        className="w-full px-4 py-2 bg-slate-900/60 border border-slate-800 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 text-slate-100 placeholder-slate-500"
                                        required 
                                    />
                                </div>
                                <div>
                                    <label className="block text-xs font-bold text-slate-300 uppercase mb-2">Numeric Score (0 - 100)</label>
                                    <input 
                                        type="number" 
                                        value={grade} 
                                        onChange={(e) => setGrade(e.target.value)} 
                                        placeholder="e.g. 85.5"
                                        step="0.1"
                                        min="0"
                                        max="100"
                                        className="w-full px-4 py-2 bg-slate-900/60 border border-slate-800 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 text-slate-100 placeholder-slate-500"
                                        required 
                                    />
                                </div>
                                <button 
                                    type="submit"
                                    className="w-full py-2.5 bg-indigo-600 text-white font-bold rounded-xl hover:bg-indigo-500 transition duration-200 shadow-lg shadow-indigo-600/20 focus:outline-none"
                                >
                                    Add Student
                                </button>
                            </form>
                        </div>

                        {/* Table Panel (2 Cols) */}
                        <div className="glass-panel rounded-2xl p-6 lg:col-span-2 border-t border-slate-800">
                            <h2 className="text-lg font-bold text-indigo-300 mb-6 pb-2 border-b border-slate-800">Gradebook Directory ({stats.count})</h2>
                            {students.length === 0 ? (
                                <div className="text-center py-10 text-slate-500 font-medium">No records found. Add a student to start.</div>
                            ) : (
                                <div className="overflow-x-auto">
                                    <table className="w-full text-left border-collapse">
                                        <thead>
                                            <tr className="text-slate-400 font-semibold text-xs border-b border-slate-800/80 uppercase tracking-wider">
                                                <th className="py-3 px-4">Student Name</th>
                                                <th className="py-3 px-4 text-center">Score / Grade</th>
                                                <th className="py-3 px-4 text-right">Actions</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {students.map((student) => (
                                                <tr key={student.id} className="border-b border-slate-800/50 hover:bg-slate-800/30 transition">
                                                    <td className="py-4 px-4 font-semibold text-slate-200">{student.name}</td>
                                                    <td className="py-4 px-4 text-center font-extrabold text-indigo-400">{student.grade.toFixed(1)}%</td>
                                                    <td className="py-4 px-4 text-right">
                                                        <button 
                                                            onClick={() => handleDelete(student.id)}
                                                            className="px-3 py-1.5 bg-rose-500/10 text-rose-400 font-bold rounded-lg hover:bg-rose-500/20 transition text-xs"
                                                        >
                                                            Delete
                                                        </button>
                                                    </td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
